                  'html': f'<iframe src=\"{embed_src}\" width=\"800\" height=\"600\" frameborder=\"0\" allowfullscreen sandbox=\"allow-scripts allow-same-origin\"></iframe>',
              }

              out_dir = f'site/oembed/{project_slug}'
              os.makedirs(out_dir, exist_ok=True)
              out_path = f'{out_dir}/{model_slug}.json'
              with open(out_path, 'w') as f:
