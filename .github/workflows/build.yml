                  'title': f\"{model_name} – {info['project']}\",
                  'provider_name': 'St. John Software',
                  'provider_url': 'https://www.bstjohn.net',
                  'thumbnail_url': f'{BASE_URL}/{quote(png)}',
                  'thumbnail_width': 800,
                  'thumbnail_height': 600,
                  'width': 800,
                  'height': 600,
                  # sandbox: allow-scripts needed for Three.js rendering,
