      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        run: |
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA::8}"
          aws s3 sync ./site "s3://www.bstjohn.net/3d-models/pr-preview/pr-${{ github.event.number }}/${SHORT_SHA}/" --delete

      - name: Comment on PR with thumbnails
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            async function withRetry(fn, retries = 3, delayMs = 2000) {
              for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                  return await fn();
                } catch (err) {
                  if (attempt === retries) throw err;
                  console.log(`Attempt ${attempt} failed: ${err.message}. Retrying in ${delayMs * attempt}ms...`);
                  await new Promise(r => setTimeout(r, delayMs * attempt));
                }
              }
            }

            function getStlMetadata(stlPath) {
              try {
                const stat = fs.statSync(stlPath);
                const size = stat.size;
                if (size < 84) return { size, triangles: null };
                const buf = Buffer.alloc(84);
                const fd = fs.openSync(stlPath, 'r');
                fs.readSync(fd, buf, 0, 84, 0);
                fs.closeSync(fd);
                const triangles = buf.readUInt32LE(80);
                if (size !== 84 + triangles * 50) return { size, triangles: null };
                return { size, triangles };
              } catch {
                return null;
              }
            }

            function formatSize(bytes) {
              if (bytes < 1024) return `${bytes} bytes`;
              if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
              return `${(bytes / 1048576).toFixed(1)} MB`;
            }

            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const shortSha = context.payload.pull_request.head.sha.substring(0, 8);
            const baseUrl = `https://www.bstjohn.net/3d-models/pr-preview/pr-${prNumber}/${shortSha}`;

            // Get files changed in this PR
            const { data: files } = await withRetry(() => github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: prNumber,
            }));

            // Build a map of changed SCAD files: png-name → project-name
            const changedModels = new Map();
            for (const f of files) {
              if (!f.filename.endsWith('.scad')) continue;
              const png = path.basename(f.filename, '.scad') + '.png';
              const dir = f.filename.split('/')[0];
              const project = dir.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
              changedModels.set(png, project);
            }

            // Read validation results
            let validationResults = [];
            try {
              validationResults = JSON.parse(fs.readFileSync('site/validation.json', 'utf8'));
            } catch (e) {
              console.log('No validation results found');
            }

            // Only show thumbnails for models changed in this PR
            const pngFiles = fs.readdirSync('site')
              .filter(f => f.endsWith('.png') && changedModels.has(f))
              .sort();

            if (pngFiles.length === 0 && validationResults.length === 0) {
              console.log('No changed model thumbnails or validation results found, skipping comment');
              return;
            }

            // Group PNGs by project
            const groups = {};
            for (const png of pngFiles) {
              const project = changedModels.get(png);
              if (!groups[project]) groups[project] = [];
              groups[project].push(png);
            }

            // Find existing bot comment to update instead of creating duplicates
            // Use paginate to avoid missing the bot comment on PRs with >30 comments.
            const allComments = await withRetry(() => github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            }));

            const marker = '## 🔍 Model Preview';
            const existing = allComments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            // Collect all previously-deployed SHAs for this PR from the existing comment body.
            const prPreviewPattern = new RegExp(
              `pr-preview/pr-${prNumber}/([a-f0-9]{8})/`,
              'g'
            );
            const previousShas = [];
            if (existing) {
              let m;
              while ((m = prPreviewPattern.exec(existing.body)) !== null) {
                if (m[1] !== shortSha && !previousShas.includes(m[1])) {
                  previousShas.push(m[1]);
                }
              }
            }

            let body = `## 🔍 Model Preview\n\n`;
            body += `**[View interactive 3D models](${baseUrl}/)**\n\n`;

            const MAX_PREV_BUILDS = 10;
            const trimmedShas = previousShas.slice(0, MAX_PREV_BUILDS);
            if (trimmedShas.length > 0) {
              const suffixSegment = `/pr-preview/pr-${prNumber}/${shortSha}`;
              const siteBase = baseUrl.replace(suffixSegment, '');
              if (siteBase === baseUrl) {
                console.warn(`Warning: could not strip SHA segment from baseUrl — skipping previous builds section. baseUrl=${baseUrl}`);
              } else {
                // Note: once more than MAX_PREV_BUILDS+1 builds have deployed, trimmedShas will
                // always be MAX_PREV_BUILDS items and hiddenCount will always be 1. The
                // "1 older omitted" label will therefore persist on every subsequent build —
                // this is expected behaviour of the rolling window approach.
                const hiddenCount = previousShas.length - trimmedShas.length;
                const suffix = hiddenCount > 0 ? ` — ${hiddenCount} older omitted` : '';
                body += `<details>\n<summary>Previous builds (${trimmedShas.length}${suffix})</summary>\n\n`;
                for (const sha of trimmedShas) {
                  const prevUrl = `${siteBase}/pr-preview/pr-${prNumber}/${sha}/`;
                  body += `- [\`${sha}\`](${prevUrl})\n`;
                }
                body += `\n</details>\n\n`;
              }
            }

            for (const project of Object.keys(groups).sort()) {
              body += `### ${project}\n\n`;
              for (const png of groups[project]) {
                const name = png.replace(/\.png$/, '').replace(/[-_]/g, ' ');
                const stlFile = path.join('site', png.replace(/\.png$/, '.stl'));
                const meta = getStlMetadata(stlFile);
                let stats = '';
                if (meta) {
                  stats = formatSize(meta.size);
                  if (meta.triangles !== null) stats += ` · ${meta.triangles.toLocaleString()} triangles`;
                  stats = ` — ${stats}`;
                }
                body += `**${name}**${stats}\n`;
                body += `![${name}](${baseUrl}/${encodeURIComponent(png)})\n\n`;
              }
            }

            if (validationResults.length > 0) {
              const anyFailed = validationResults.some(r => !r.passed);
              body += `### ${anyFailed ? '⚠️' : '✅'} Mesh Validation\n\n`;
              body += `| Model | Triangles | Volume | Status |\n`;
              body += `|-------|-----------|--------|--------|\n`;
              for (const r of validationResults) {
                const status = r.passed ? '✅ Pass' : '❌ Fail';
                body += `| ${r.name} | ${r.triangles.toLocaleString()} | ${r.volume} | ${status} |\n`;
              }
              body += `\n`;
              if (anyFailed) {
                body += `> **Mesh issues detected.** Models with ❌ have non-manifold geometry, degenerate triangles, or non-positive volume. These will slice incorrectly and produce failed prints.\n\n`;
              }
            }

            // Read interference results
            let interferenceResults = [];
            try {
              interferenceResults = JSON.parse(fs.readFileSync('site/interference.json', 'utf8'));
            } catch (e) {
              console.log('No interference results found');
            }

            if (interferenceResults.length > 0) {
              const anyFailed = interferenceResults.some(r => !r.passed);
              const allSkipped = interferenceResults.every(r => r.skipped);
              const headerIcon = anyFailed ? '⚠️' : allSkipped ? '⏭️' : '✅';
              body += `### ${headerIcon} Mating Part Interference\n\n`;
              body += `| Part A | Part B | Overlap | Status |\n`;
              body += `|--------|--------|---------|--------|\n`;
              for (const r of interferenceResults) {
                const status = r.skipped ? '⏭️ Skip' : r.passed ? '✅ Pass' : '❌ Fail';
                const vol = r.overlap_volume_mm3 !== null && r.overlap_volume_mm3 !== undefined
                  ? `${r.overlap_volume_mm3.toFixed(1)} mm³`
                  : r.error || 'N/A';
                body += `| ${r.part_a} | ${r.part_b} | ${vol} | ${status} |\n`;
              }
              body += `\n`;
              if (anyFailed) {
                body += `> **Interference detected.** Mating parts with ❌ physically overlap and won't assemble correctly.\n\n`;
              }
            }

            body += `---\n*Preview deployed to [${baseUrl}](${baseUrl}/)*`;

            if (existing) {
              await withRetry(() => github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              }));
              console.log('Updated existing preview comment');
            } else {
              await withRetry(() => github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              }));
              console.log('Created new preview comment');
            }

      - name: Enforce mesh validation
        if: steps.validate.outputs.failed == 'true'
        run: |
          echo "::error::Mesh validation failed — one or more STL files have integrity issues. See the PR comment for details."
          cat site/validation.json
          exit 1

      - name: Enforce dependency graph check
        if: steps.depgraph.outputs.failed == 'true'
        run: |
          echo "::error::Dependency graphs are out of date. Run: bash scripts/scad-dep-graph.sh"
          exit 1

      - name: Enforce metadata validation
        if: steps.metadata.outputs.failed == 'true'
        run: |
          echo "::error::Metadata validation failed — one or more meta.json files don't match meta.schema.json"
          exit 1

      - name: Enforce interference check
        if: steps.interference.outputs.failed == 'true'
        run: |
          echo "::error::Mating part interference detected — one or more part pairs overlap. See the PR comment for details."
          cat site/interference.json
          exit 1

      - name: Enforce parameters validation
        if: steps.param_meta.outputs.failed == 'true'
        run: |
          echo "::error::Parameters manifest validation failed"
          cat .param-failures
          exit 1
