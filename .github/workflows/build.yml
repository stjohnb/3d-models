      - name: Copy index.html and embed.html to site with cache-busting hash and injected data
        run: |
          sed "s/__BUILD_HASH__/${GITHUB_SHA::8}/g" index.html > site/index.html
          sed "s/__BUILD_HASH__/${GITHUB_SHA::8}/g" embed.html > site/embed.html
          sed "s/__BUILD_HASH__/${GITHUB_SHA::8}/g" openscad-worker.js > site/openscad-worker.js
          cp filament-colors.json site/filament-colors.json
          cp favicon.svg site/favicon.svg
          cp site.webmanifest site/site.webmanifest
          cp robots.txt site/robots.txt
          cp llms.txt site/llms.txt
          python3 -c "
          import json, sys
          from html import escape
          sys.path.insert(0, '.')
          from scripts.oembed_helpers import slugify, display_name, parse_scad_map, BASE_URL

          with open('site/index.html') as f:
              html = f.read()

          # Inject structured data
          with open('site/structured-data.json') as f:
              jsonld = f.read()

          # Escape characters that could break out of <script> when embedded inline.
          jsonld = jsonld.replace('&', '\\u0026').replace('<', '\\u003c').replace('>', '\\u003e')

          tag = '<script type=\"application/ld+json\">\n' + jsonld + '\n</script>'
          html = html.replace('<!-- __STRUCTURED_DATA__ -->', tag)

          # Inject OEmbed discovery link tags
          link_tags = []
          for stl, info in sorted(parse_scad_map('site/.scad-map').items()):
              model_name = display_name(stl).title()
              project_slug = slugify(info['dir'])
              model_slug = slugify(stl)
              href = f'{BASE_URL}/oembed/{project_slug}/{model_slug}.json'
              title = f'{model_name} – {info[\"project\"]}'
              link_tags.append(f'<link rel=\"alternate\" type=\"application/json+oembed\" href=\"{escape(href)}\" title=\"{escape(title)}\">')

          html = html.replace('<!-- __OEMBED_LINKS__ -->', '\n  '.join(link_tags))

          with open('site/index.html', 'w') as f:
              f.write(html)

          print(f'Injected structured data and {len(link_tags)} OEmbed link tags into index.html')
          "

      - name: Install AWS CLI
