      - name: Generate structured data
        run: |
          python3 -c "
          import json, os, sys
          from urllib.parse import quote
          sys.path.insert(0, '.')
          from scripts.oembed_helpers import display_name, load_meta_failures, thumbnail_name, parse_scad_map, BASE_URL

          scad_map = parse_scad_map('site/.scad-map')

          failed_meta = load_meta_failures()

          # Load project descriptions from meta.json files (skipping invalid ones)
          project_descriptions = {}
          for stl, info in scad_map.items():
              project_dir = info['dir']
              if project_dir not in project_descriptions:
                  meta_path = os.path.join(project_dir, 'meta.json')
                  if os.path.isfile(meta_path) and meta_path not in failed_meta:
                      try:
                          with open(meta_path) as mf:
                              meta = json.load(mf)
                      except json.JSONDecodeError:
                          meta = {}
                      if 'description' in meta:
                          project_descriptions[project_dir] = meta['description']

          items = []
          for i, (stl, info) in enumerate(sorted(scad_map.items()), start=1):
              name = display_name(stl).title()
              png = thumbnail_name(stl)
              desc = project_descriptions.get(info['dir'], f'3D printable part from the {info[\"project\"]} collection')
              item = {
                  '@type': '3DModel',
                  'name': name,
                  'description': desc,
                  'contentUrl': f'{BASE_URL}/{quote(stl)}',
                  'encodingFormat': 'model/stl',
                  'thumbnailUrl': f'{BASE_URL}/{quote(png)}',
                  'isPartOf': {'@type': 'CreativeWork', 'name': info['project']},
                  'creator': {
                      '@type': 'Organization',
                      'name': 'St. John Software',
                      'url': 'https://github.com/St-John-Software',
                  },
              }
              stl_path = f'site/{stl}'
              if os.path.isfile(stl_path):
                  item['contentSize'] = f'{os.path.getsize(stl_path)} B'
              items.append({'@type': 'ListItem', 'position': i, 'item': item})

          jsonld = {
              '@context': 'https://schema.org',
              '@type': 'CollectionPage',
              'name': '3D Printable Models',
              'description': 'Interactive 3D viewer for printable OpenSCAD models — browse, rotate, and download STL files.',
              'url': f'{BASE_URL}/',
              'creator': {
                  '@type': 'Organization',
                  'name': 'St. John Software',
                  'url': 'https://github.com/St-John-Software',
              },
              'mainEntity': {'@type': 'ItemList', 'itemListElement': items},
          }

          with open('site/structured-data.json', 'w') as f:
              json.dump(jsonld, f, indent=2)

          print('Generated structured-data.json')
          "

      - name: Generate OEmbed JSON files
        run: |
