          import json, os, sys
          from html import escape
          from urllib.parse import quote
          sys.path.insert(0, '.')
          from scripts.oembed_helpers import slugify, display_name, thumbnail_name, parse_scad_map, BASE_URL

          scad_map = parse_scad_map('site/.scad-map')

