name: Build Models

# Triggers removed for the public snapshot — this workflow is intentionally disabled.
# See the private source repository for the active version.
on:
  workflow_dispatch:
permissions:
  # write needed at workflow scope for gallery commit on main pushes;
  # acceptable trade-off for a single-job workflow on a self-hosted runner.
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}
  cancel-in-progress: true

env:
  # Memory/time caps for capped-openscad.sh STL renders (issue #272).
  # Thumbnail/orthographic-view steps override these lower via step-level env.
  #
  # DELIBERATE VALUES — do not lower without checking the heaviest models:
  # the full-res (512 px) nz-ski-fields part renders. The #248 merge build
  # spent 56 min cold-rendering the three parts, and the full-res assembly
  # variant measured 31 min / >8G peak on the ryzen runner (32 GB) before it
  # moved to a 128 px preview heightmap (#271). 28G is cgroup-enforced by
  # capped-openscad.sh, so a runaway render still fails cleanly without
  # freezing the host. Renders are cached, so the full cost only recurs when
  # a heavy .scad source (or the OpenSCAD version) changes.
  RENDER_MEM_MAX: 28G
  RENDER_TIMEOUT: "3600"

jobs:
  build:
    # Pinned to the ryzen runner (rather than any [self-hosted, linux] box)
    # so RENDER_MEM_MAX is calibrated against a host of known RAM capacity.
    # The ryzen label must exist on that runner's registration or this job
    # queues forever.
    runs-on: [self-hosted, linux, ryzen]

    steps:
      - uses: actions/checkout@v7

      - name: Verify dependency graphs are up-to-date
        id: depgraph
        run: |
          bash scripts/scad-dep-graph.sh
          if ! git diff --quiet -- '*/dependency-graph.md'; then
            echo "::warning::Dependency graphs are out of date. Run: bash scripts/scad-dep-graph.sh"
            git diff -- '*/dependency-graph.md'
            git checkout -- '*/dependency-graph.md'
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate project metadata
        id: metadata
        run: |
          python3 -m venv .venv-meta
          .venv-meta/bin/pip install --quiet 'jsonschema>=4.0,<5'
          .venv-meta/bin/python3 -c "
          import json, glob, os, sys
          from jsonschema import validate, ValidationError

          with open('meta.schema.json') as f:
              schema = json.load(f)

          files = sorted(glob.glob('*/meta.json'))
          if not files:
              print('No meta.json files found — skipping validation')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('failed=false\n')
              sys.exit(0)

          errors = 0
          failed_paths = []
          for path in files:
              try:
                  with open(path) as f:
                      data = json.load(f)
              except json.JSONDecodeError as e:
                  print(f'  FAIL: {path} — invalid JSON: {e}')
                  errors += 1
                  failed_paths.append(path)
                  continue
              try:
                  validate(instance=data, schema=schema)
                  print(f'  PASS: {path}')
              except ValidationError as e:
                  print(f'  FAIL: {path} — {e.message}')
                  errors += 1
                  failed_paths.append(path)

          # Write failed paths so downstream steps can skip invalid meta.json files
          with open('.meta-failures', 'w') as f:
              f.write('\n'.join(failed_paths))

          if errors:
              print(f'::warning::{errors} meta.json file(s) failed schema validation')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'failed={str(bool(errors)).lower()}\n')
          "

      - name: Validate parameters manifests
        id: param_meta
        run: |
          .venv-meta/bin/python3 -c "
          import glob, json, os, sys
          from jsonschema import validate, ValidationError

          with open('parameters.schema.json') as f:
              schema = json.load(f)

          # Always create the file so the enforce step's check is honest,
          # even when no manifests exist yet.
          with open('.param-failures', 'w'):
              pass

          files = sorted(glob.glob('*/*.parameters.json'))
          if not files:
              print('No parameters.json files found — skipping validation')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('failed=false\n')
              sys.exit(0)

          errors = 0
          failed_paths = []
          for path in files:
              try:
                  with open(path) as f:
                      data = json.load(f)
              except json.JSONDecodeError as e:
                  print(f'  FAIL: {path} — invalid JSON: {e}')
                  errors += 1
                  failed_paths.append(path)
                  continue
              try:
                  validate(instance=data, schema=schema)
              except ValidationError as e:
                  print(f'  FAIL: {path} — {e.message}')
                  errors += 1
                  failed_paths.append(path)
                  continue
              # Cross-validation: default must be within [min, max] for number params.
              bounds_ok = True
              for param in data['parameters']:
                  if param.get('type') == 'number':
                      pmin = param['min']
                      pmax = param['max']
                      pdef = param['default']
                      if pmax < pmin:
                          pname = param['name']
                          print(f'  FAIL: {path} — parameter {pname!r}: max ({pmax}) < min ({pmin})')
                          errors += 1
                          failed_paths.append(path)
                          bounds_ok = False
                          break
                      if not (pmin <= pdef <= pmax):
                          pname = param['name']
                          print(f'  FAIL: {path} — parameter {pname!r}: default {pdef} is outside [{pmin}, {pmax}]')
                          errors += 1
                          failed_paths.append(path)
                          bounds_ok = False
                          break
              if not bounds_ok:
                  continue
              # Cross-validation: manifest must sit next to a renderable .scad.
              project_dir, fname = os.path.split(path)
              basename = fname[:-len('.parameters.json')]
              if basename.startswith('_'):
                  print(f'  FAIL: {path} — library files (_*.scad) cannot have parameter manifests')
                  errors += 1
                  failed_paths.append(path)
                  continue
              scad_path = os.path.join(project_dir, basename + '.scad')
              if not os.path.isfile(scad_path):
                  print(f'  FAIL: {path} — no matching renderable .scad found at {scad_path}')
                  errors += 1
                  failed_paths.append(path)
                  continue
              print(f'  PASS: {path}')

          with open('.param-failures', 'w') as f:
              f.write('\n'.join(failed_paths))

          if errors:
              print(f'::warning::{errors} parameters.json file(s) failed validation')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'failed={str(bool(errors)).lower()}\n')
          "

      - name: Run Python unit tests for build scripts
        run: |
          cd scripts
          python3 -m unittest test_render_view test_oembed_helpers test_fetch_openscad_wasm test_render_cache test_capped_openscad -v

      - name: Install OpenSCAD and dependencies
        run: |
          set -eo pipefail

          if command -v openscad &>/dev/null; then
            echo "OpenSCAD already installed"
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq openscad xvfb
          fi

          if command -v montage &>/dev/null; then
            echo "ImageMagick already installed"
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq imagemagick
          fi

          command -v zip &>/dev/null || sudo apt-get install -y -qq zip
          command -v qrencode &>/dev/null || sudo apt-get install -y -qq qrencode

      - name: Prepare Xvfb environment
        run: |
          set -eo pipefail
          # Remove stale X lock files and sockets that prior interrupted CI runs
          # may have left behind on this self-hosted runner. Without this, xvfb-run
          # can fail with "Server is already active for display N" or
          # "Cannot establish any listening sockets".
          sudo rm -f /tmp/.X*-lock 2>/dev/null || true
          sudo rm -rf /tmp/.X11-unix 2>/dev/null || true
          sudo mkdir -p /tmp/.X11-unix
          sudo chmod 1777 /tmp/.X11-unix
          if ! command -v xvfb-run >/dev/null; then
            echo "::error::xvfb-run is required but not installed"
            exit 1
          fi
          xvfb-run --help >/dev/null 2>&1 || true
          echo "Xvfb environment prepared."

      - name: Check OpenSCAD version
        id: scad_version
        run: |
          set -eo pipefail
          mkdir -p site
          CURRENT_VERSION="$(openscad --version 2>&1)"
          CURRENT_VERSION="${CURRENT_VERSION%%$'\n'*}"
          echo "Current OpenSCAD version: $CURRENT_VERSION"
          echo "$CURRENT_VERSION" > site/openscad-version.txt

          STORED_VERSION=""
          if [ -f .openscad-version ]; then
            STORED_VERSION="$(cat .openscad-version)"
            STORED_VERSION="${STORED_VERSION%%$'\r'*}"
          fi

          if [ "$CURRENT_VERSION" != "$STORED_VERSION" ]; then
            echo "::warning::OpenSCAD version changed: '$STORED_VERSION' -> '$CURRENT_VERSION'. Update .openscad-version and expect a full re-render."
          else
            echo "OpenSCAD version matches stored value ($CURRENT_VERSION)"
          fi

      - name: Install ADMesh
        run: |
          if command -v admesh &>/dev/null; then
            echo "ADMesh already installed"
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq admesh
          fi
          admesh --version

      - name: Render STL files
        run: |
          mkdir -p site
          > site/.scad-map
          OPENSCAD_VERSION="$(cat site/openscad-version.txt)"
          CACHE_DIR="${RENDER_CACHE_DIR:-$HOME/.cache/3d-models/render}"
          mkdir -p "$CACHE_DIR"
          find . -name '*.scad' -not -path './.github/*' | while read -r file; do
            name="$(basename "$file" .scad)"
            name_re='^[A-Za-z0-9._ -]+$'
            if [[ ! "$name" =~ $name_re ]]; then
              echo "::error::Refusing to render $file: filename contains characters outside [A-Za-z0-9._ -]"
              exit 1
            fi
            # Skip library files (underscore-prefixed by convention)
            if [[ "$(basename "$file")" == _* ]]; then
              echo "  Skipping $file (library, underscore-prefixed)"
              continue
            fi
            dir="$(dirname "$file" | sed 's|^\./||' | cut -d/ -f1)"
            src="$(echo "$file" | sed 's|^\./||')"
            key="$(python3 scripts/render_cache.py key "$file" --openscad-version "$OPENSCAD_VERSION")"
            cached="$CACHE_DIR/$key.stl"
            if [ "${RENDER_CACHE_DISABLED:-}" != "1" ] && [ -s "$cached" ]; then
              echo "  Cache HIT: $file ($key)"
              cp "$cached" "site/$name.stl"
              touch "$cached"   # refresh mtime so the prune keeps active entries
              echo "$name.stl	$dir	$src" >> site/.scad-map
              continue
            fi
            echo "Rendering: $file -> site/$name.stl (cache MISS $key)"
            bash "$GITHUB_WORKSPACE/scripts/capped-openscad.sh" --export-format binstl -o "site/$name.stl" "$file" > /tmp/scad.log 2>&1 && rc=0 || rc=$?
            cat /tmp/scad.log
            if [ "$rc" -eq 124 ] || [ "$rc" -ge 128 ]; then
              echo "::error::render exceeded memory/time cap: $file (rc=$rc)"
              rm -f "site/$name.stl"
              exit 1
            elif grep -qiE 'top level object is empty|nothing to export' /tmp/scad.log; then
              echo "  Skipping $file (library, no top-level geometry)"
              rm -f "site/$name.stl"
            elif [ $rc -ne 0 ] && { [ ! -s "site/$name.stl" ] || [ "$(stat -c%s "site/$name.stl" 2>/dev/null || echo 0)" -le 84 ]; }; then
              echo "::warning::$file exited $rc with no geometry — skipping (suspected library)"
              rm -f "site/$name.stl"
            elif [ $rc -ne 0 ]; then
              echo "  ERROR rendering $file"
              exit 1
            else
              # Record mapping: stl-name → project-dir → source-path
              echo "$name.stl	$dir	$src" >> site/.scad-map
              # Populate the cache atomically so a concurrent build never reads
              # a half-written STL.
              if [ "${RENDER_CACHE_DISABLED:-}" != "1" ]; then
                cp "site/$name.stl" "$cached.tmp.$$" && mv "$cached.tmp.$$" "$cached"
              fi
            fi
          done
          # Bound cache growth: drop entries not touched in 30 days.
          find "$CACHE_DIR" -maxdepth 1 -name '*.stl' -type f -mtime +30 -delete 2>/dev/null || true

      - name: Validate STL meshes
        id: validate
        run: |
          python3 -c "
          import subprocess, json, glob, os, re, sys, math

          results = []
          has_failure = False

          for stl in sorted(glob.glob('site/*.stl')):
              name = os.path.splitext(os.path.basename(stl))[0]
              proc = subprocess.run(['admesh', stl], capture_output=True, text=True)
              output = proc.stdout + proc.stderr

              def extract_int(pattern):
                  m = re.search(pattern + r'\s*:\s*(\d+)', output, re.MULTILINE)
                  return int(m.group(1)) if m else 0

              def extract_float(pattern, sep=':'):
                  m = re.search(pattern + r'\s*' + re.escape(sep) + r'\s*([-+]?[\d.]+(?:[eE][-+]?\d+)?)', output, re.MULTILINE)
                  return float(m.group(1)) if m else 0.0

              triangles   = extract_int(r'Number of facets')
              unconnected = extract_int(r'Number of unconnected facets')
              degenerate  = extract_int(r'Degenerate facets')
              volume      = extract_float(r'Volume')

              min_x = extract_float(r'Min X', '=')
              max_x = extract_float(r'Max X', '=')
              min_y = extract_float(r'Min Y', '=')
              max_y = extract_float(r'Max Y', '=')
              min_z = extract_float(r'Min Z', '=')
              max_z = extract_float(r'Max Z', '=')
              bb_x = max_x - min_x
              bb_y = max_y - min_y
              bb_z = max_z - min_z

              # Rough print-time heuristic
              estimated_minutes = None
              if volume > 0:
                  if bb_z < 0.5:
                      estimated_minutes = max(1, round(volume / 200))
                  else:
                      layer_count = bb_z / 0.2
                      xy_area = volume / bb_z
                      perimeter = 4 * math.sqrt(xy_area)
                      time_per_layer = perimeter / 50
                      total_seconds = layer_count * time_per_layer * 5
                      estimated_minutes = max(1, round(total_seconds / 60))

              passed = unconnected == 0 and degenerate == 0 and volume > 0

              if not passed:
                  has_failure = True

              results.append({
                  'name': name,
                  'triangles': triangles,
                  'volume': round(volume, 2),
                  'degenerate': degenerate,
                  'unconnected': unconnected,
                  'passed': passed,
                  'estimated_minutes': estimated_minutes,
              })

              status = 'PASS' if passed else 'FAIL'
              print(f'  {status}: {name} — {triangles} triangles, volume={volume:.2f}')

          with open('site/validation.json', 'w') as f:
              json.dump(results, f, indent=2)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'failed={str(has_failure).lower()}\n')
          "

      - name: Bundle openscad-wasm and sources for in-browser customizer
        run: |
          python3 scripts/fetch_openscad_wasm.py

          # Source .scad files are already public on GitHub; staging them
          # under site/sources/ lets the in-browser customizer fetch them
          # so openscad-wasm can resolve `include <...>` at render time.
          find . -name '*.scad' \
            -not -path './.github/*' \
            -not -path './site/*' \
            -not -path './.cache/*' \
            -not -path './.venv-*' \
            | while read -r f; do
              rel="${f#./}"
              mkdir -p "site/sources/$(dirname "$rel")"
              cp "$f" "site/sources/$rel"
            done

          # Parameter manifests that passed validation also go to S3 so the
          # browser can fetch them. Skip ones in .param-failures.
          if [ -s .param-failures ]; then
            mapfile -t failed_params < .param-failures
          else
            failed_params=()
          fi
          find . -name '*.parameters.json' \
            -not -path './site/*' \
            -not -path './.cache/*' \
            -not -path './.venv-*' \
            | while read -r f; do
              rel="${f#./}"
              skip=0
              for failed in "${failed_params[@]}"; do
                [ "$rel" = "$failed" ] && skip=1 && break
              done
              [ $skip -eq 1 ] && continue
              mkdir -p "site/sources/$(dirname "$rel")"
              cp "$f" "site/sources/$rel"
            done

          # Binary render assets (e.g. surface() heightmaps) referenced by a
          # sibling .scad must also be staged so the in-browser customizer can
          # write them into the wasm FS. Match by basename appearing in a .scad
          # in the same directory so unrelated images (screenshots) aren't staged.
          find . -name '*.png' \
            -not -path './.github/*' \
            -not -path './site/*' \
            -not -path './.cache/*' \
            -not -path './.venv-*' \
            | while read -r f; do
              dir="$(dirname "$f")"
              bn="$(basename "$f")"
              if grep -qF "$bn" "$dir"/*.scad 2>/dev/null; then
                rel="${f#./}"
                mkdir -p "site/sources/$(dirname "$rel")"
                cp "$f" "site/sources/$rel"
              fi
            done

          # Per-project file listings so the browser can discover library
          # files (S3 doesn't serve directory indexes).
          for dir in site/sources/*/; do
            [ -d "$dir" ] || continue
            python3 -c "
          import json, os, sys
          d = sys.argv[1]
          scads = sorted(f for f in os.listdir(d) if f.endswith('.scad') or f.endswith('.png'))
          with open(os.path.join(d, 'manifest.json'), 'w') as out:
              json.dump(scads, out)
          " "$dir"
          done

      - name: Set up Node.js for WASM smoke test
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Smoke-test WASM customizer rendering
        run: node scripts/test_wasm_customizer.mjs

      - name: Check mating part interference
        id: interference
        run: |
          python3 -m venv .venv-interference
          .venv-interference/bin/pip install --quiet 'trimesh>=4.0,<5' 'manifold3d>=2.3,<4'
          .venv-interference/bin/python3 -m unittest discover -s scripts -p "test_check_interference.py" -v
          .venv-interference/bin/python3 scripts/check_interference.py

      - name: Generate standalone HTML viewers
        run: python3 scripts/generate-standalone.py

      - name: Bundle project zips
        run: |
          declare -A project_files
          while IFS=$'\t' read -r stl dir src; do
            project_files[$dir]+="site/$stl"$'\n'
          done < site/.scad-map

          for dir in "${!project_files[@]}"; do
            mapfile -t files < <(printf '%s' "${project_files[$dir]}")
            if [ ${#files[@]} -ge 2 ]; then
              zipname="site/${dir}.zip"
              echo "Bundling ${#files[@]} files into $zipname"
              zip -j "$zipname" "${files[@]}" || { echo "::error::Failed to create $zipname"; exit 1; }
            else
              echo "Skipping $dir (only ${#files[@]} file)"
            fi
          done

      - name: Bundle project source zips
        run: |
          set -o pipefail
          mapfile -t dirs < <(cut -f2 site/.scad-map | sort -u)
          for dir in "${dirs[@]}"; do
            [ -d "$dir" ] || continue
            zipname="site/${dir}-source.zip"
            echo "Bundling source for $dir into $zipname"
            git ls-files -z -- "$dir" | xargs -0 -r zip -q "$zipname" \
              || { echo "::error::Failed to create $zipname"; exit 1; }
          done

      - name: Render PNG thumbnails
        env:
          RENDER_MEM_MAX: 4G
          RENDER_TIMEOUT: "120"
        run: |
          set -o pipefail
          render_thumbs() {
            xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" bash -c '
              while IFS="$(printf "\t")" read -r stl dir src; do
                name="${stl%.stl}"
                echo "Rendering thumbnail: $src -> site/$name.png"
                bash "$GITHUB_WORKSPACE/scripts/capped-openscad.sh" -o "site/$name.png" --imgsize=800,600 "$src" \
                  || echo "::warning::Failed to render thumbnail for $name"
              done < site/.scad-map
            '
          }

          if ! command -v xvfb-run >/dev/null; then
            echo "::warning::xvfb-run not available, attempting direct rendering (thumbnails may fail)"
            bash -c '
              while IFS="$(printf "\t")" read -r stl dir src; do
                name="${stl%.stl}"
                echo "Rendering thumbnail: $src -> site/$name.png"
                bash "$GITHUB_WORKSPACE/scripts/capped-openscad.sh" -o "site/$name.png" --imgsize=800,600 "$src" \
                  || echo "::warning::Failed to render thumbnail for $name"
              done < site/.scad-map
            '
            exit 0
          fi

          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            echo "Xvfb thumbnail render attempt $attempt/$max_attempts"
            if render_thumbs 2>/tmp/xvfb-stderr.log; then
              cat /tmp/xvfb-stderr.log >&2
              exit 0
            fi
            rc=$?
            cat /tmp/xvfb-stderr.log >&2
            if grep -qE 'Xvfb failed to start|Server is already active|Cannot establish any listening sockets|Cannot open display' /tmp/xvfb-stderr.log; then
              echo "::warning::Xvfb start failure on attempt $attempt (rc=$rc). Cleaning lock files and retrying."
              sudo rm -f /tmp/.X*-lock 2>/dev/null || true
              sudo rm -rf /tmp/.X11-unix 2>/dev/null || true
              sudo mkdir -p /tmp/.X11-unix
              sudo chmod 1777 /tmp/.X11-unix
              sleep $((attempt * 2))
              attempt=$((attempt + 1))
              continue
            fi
            echo "::error::Thumbnail render failed (rc=$rc), not an Xvfb start error."
            exit $rc
          done
          echo "::error::Xvfb failed to start after $max_attempts attempts."
          exit 1

      - name: Render extra orthographic views for complex-interior models
        env:
          RENDER_MEM_MAX: 4G
          RENDER_TIMEOUT: "120"
        run: |
          cat > "$RUNNER_TEMP/render-interior-views.sh" << 'SCRIPT'
          while IFS="$(printf "\t")" read -r stl dir src; do
            if [ ! -f "$dir/meta.json" ]; then
              continue
            fi
            if ! python3 -c "import json,sys; d=json.load(open(sys.argv[1])); sys.exit(0 if d.get('complex_interior') else 1)" "$dir/meta.json" 2>/dev/null; then
              continue
            fi
            name="${stl%.stl}"
            echo "Rendering orthographic views for $src (complex_interior=true)"
            for spec in "top:0,0,0,0,0,0,500:ortho" "bottom:0,0,0,180,0,0,500:ortho" "front:0,0,0,90,0,0,500:ortho"; do
              view="${spec%%:*}"; rest="${spec#*:}"; cam="${rest%%:*}"; proj="${rest##*:}"
              out="site/${name}_${view}.png"
              echo "  $view -> $out"
              if bash "$GITHUB_WORKSPACE/scripts/capped-openscad.sh" -o "$out" --imgsize=800,600 \
                --camera="$cam" --projection="$proj" --viewall --autocenter "$src"; then
                # Guard against OpenSCAD exiting 0 but writing an empty/corrupt file
                if [ ! -s "$out" ]; then
                  echo "::warning::Empty PNG for $view view of $name — removing"
                  rm -f "$out"
                fi
              else
                echo "::warning::Failed to render $view view for $name"
                rm -f "$out"
              fi
            done
          done < site/.scad-map
          SCRIPT

          if command -v xvfb-run &>/dev/null; then
            xvfb-run bash "$RUNNER_TEMP/render-interior-views.sh" || {
              echo "::warning::xvfb-run failed to start Xvfb, retrying without virtual display"
              bash "$RUNNER_TEMP/render-interior-views.sh"
            }
          else
            echo "::warning::xvfb not available, rendering without virtual display (may fail)"
            bash "$RUNNER_TEMP/render-interior-views.sh"
          fi

      - name: Generate QR codes
        run: |
          mkdir -p site/qr
          BASE_URL="https://www.bstjohn.net/3d-models"
          while IFS="$(printf '\t')" read -r stl dir src; do
            name="${stl%.stl}"
            # Replicate JS slugify: project slug from dir (underscores/spaces→hyphens, lowercase)
            project_slug="$(echo "$dir" | sed 's/[_ ]\{1,\}/-/g' | tr '[:upper:]' '[:lower:]')"
            # Model slug: strip .stl, collapse underscores/spaces→single hyphen, lowercase
            model_slug="$(echo "$name" | sed 's/[_ ]\{1,\}/-/g' | tr '[:upper:]' '[:lower:]')"
            url="${BASE_URL}/#${project_slug}/${model_slug}"
            echo "QR: $url -> site/qr/${name}.png"
            qrencode -o "site/qr/${name}.png" -s 8 -m 2 \
              --foreground=E0E0E0 --background=1A1A2E \
              "$url" \
              || echo "::warning::Failed to generate QR for $name"
          done < site/.scad-map

      - name: Generate OG hero image
        run: |
          THUMBS=(site/*.png)
          if [ ${#THUMBS[@]} -gt 0 ] && [ -e "${THUMBS[0]}" ]; then
            montage "${THUMBS[@]}" \
