      - name: Deploy to S3 (main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.validate.outputs.failed != 'true' && steps.metadata.outputs.failed != 'true' && steps.interference.outputs.failed != 'true' && steps.param_meta.outputs.failed != 'true'
