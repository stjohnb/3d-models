      - name: Generate models manifest
        run: |
          # Build grouped models.json from .scad-map, merging estimated_minutes from validation
          python3 -c "
          import json, os, sys
          sys.path.insert(0, '.')
          from scripts.oembed_helpers import load_meta_failures

          # Load OpenSCAD version used for this render
          openscad_version = ''
          try:
              with open('site/openscad-version.txt') as f:
                  openscad_version = f.read().strip()
          except FileNotFoundError:
              pass

          # Load validation results keyed by model name
          validation = {}
          try:
              with open('site/validation.json') as f:
                  for entry in json.load(f):
                      validation[entry['name']] = entry
          except (FileNotFoundError, json.JSONDecodeError):
              pass

          failed_meta = load_meta_failures()

          # Manifests that failed validation are excluded from models.json
          # so the customizer never offers a broken parameter set.
          failed_params = set()
          try:
              with open('.param-failures') as f:
                  failed_params = {p.strip() for p in f if p.strip()}
          except FileNotFoundError:
              pass

          groups = {}
          with open('site/.scad-map') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  stl, project_dir, source = line.split('\t', 2)
                  # Title-case: replace hyphens/underscores with spaces
                  project_name = project_dir.replace('-', ' ').replace('_', ' ').title()
                  groups.setdefault(project_name, {'dir': project_dir, 'files': []})
                  file_entry = {'stl': stl, 'source': source}
                  qr_path = f\"site/qr/{stl.replace('.stl', '.png')}\"
                  if os.path.exists(qr_path):
                      file_entry['qr'] = f\"qr/{stl.replace('.stl', '.png')}\"
                  # Merge estimated_minutes from validation
                  val_name = stl.rsplit('.', 1)[0]
                  if val_name in validation and validation[val_name].get('estimated_minutes') is not None:
                      file_entry['estimated_minutes'] = validation[val_name]['estimated_minutes']
                  # Attach parameter manifest if present and validated.
                  # The customizer reads file_entry['parameters'] and
                  # discovers project sources via sources/<dir>/manifest.json.
                  source_basename = os.path.splitext(os.path.basename(source))[0]
                  params_path = os.path.join(project_dir, source_basename + '.parameters.json')
                  if os.path.isfile(params_path) and params_path not in failed_params:
                      try:
                          with open(params_path) as pf:
                              file_entry['parameters'] = json.load(pf)
                      except json.JSONDecodeError:
                          pass
                  groups[project_name]['files'].append(file_entry)

          result = {}
          for k in sorted(groups):
              entry = {'dir': groups[k]['dir'], 'files': sorted(groups[k]['files'], key=lambda m: m['stl'])}
              zip_path = f\"site/{groups[k]['dir']}.zip\"
              if os.path.exists(zip_path):
                  entry['zip'] = f\"{groups[k]['dir']}.zip\"
              src_zip_path = f\"site/{groups[k]['dir']}-source.zip\"
              if os.path.exists(src_zip_path):
                  entry['sourceZip'] = f\"{groups[k]['dir']}-source.zip\"
              # Merge metadata from meta.json if it exists and passed validation
              meta_path = os.path.join(groups[k]['dir'], 'meta.json')
              if os.path.isfile(meta_path) and meta_path not in failed_meta:
                  try:
                      with open(meta_path) as mf:
                          meta = json.load(mf)
                  except json.JSONDecodeError:
                      meta = {}
                  # Only propagate viewer-relevant fields to the manifest.
                  # license, relatedModels, and mating_pairs are intentionally excluded.
                  for field in ('description', 'tags', 'difficulty', 'version', 'hardware', 'assembly'):
                      if field in meta:
                          entry[field] = meta[field]
              if openscad_version:
                  entry['rendered_with'] = openscad_version
              result[k] = entry

          with open('site/models.json', 'w') as f:
              json.dump(result, f, indent=2)
          "
          echo "Generated models.json:"
          cat site/models.json

      - name: Generate sitemap.xml
        run: |
          python3 -c "
          import re, sys
          from urllib.parse import quote
          sys.path.insert(0, '.')
          from scripts.oembed_helpers import parse_scad_map, BASE_URL
          urls = [f'{BASE_URL}/']
          for stl in sorted(parse_scad_map('site/.scad-map')):
              name = re.sub(r'\.stl$', '', stl, flags=re.I)
              urls.append(f'{BASE_URL}/standalone/{quote(name)}.html')
          body = ''.join(f'  <url><loc>{u}</loc></url>\n' for u in urls)
          with open('site/sitemap.xml', 'w') as f:
              f.write('<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n')
              f.write('<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n')
              f.write(body)
              f.write('</urlset>\n')
          print(f'Wrote sitemap.xml with {len(urls)} URLs')
          "

      - name: Generate README gallery
        id: gallery
