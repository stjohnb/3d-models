<body>
  <header>
    <h1>3D Models</h1>

    <div class="loading">Loading models&hellip;</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
    import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

    const gallery = document.getElementById('gallery');

    // openscad-wasm renders run in a dedicated Web Worker so the CGAL/mesh
    // export work doesn't freeze the main thread. One worker is shared by
    // every customizer card on the page — the worker processes incoming
    // messages sequentially, which is the right semantics anyway since the
    // non-threaded wasm build is single-threaded.
    let _wasmWorker = null;
    let _nextRenderId = 1;
    const _pendingRenders = new Map();
    function getWasmWorker() {
      if (_wasmWorker) return _wasmWorker;
      const url = new URL(`./openscad-worker.js${cacheBust}`, import.meta.url);
      const worker = new Worker(url, { type: 'module' });
      worker.addEventListener('message', (event) => {
        const { id, stl, error } = event.data;
        const pending = _pendingRenders.get(id);
        if (!pending) return;
        _pendingRenders.delete(id);
        if (error) pending.reject(new Error(error));
        else pending.resolve(stl);
      });
      worker.addEventListener('error', (event) => {
        // A worker-level error invalidates every in-flight render; reject
        // them all so the UI can recover with an error status.
        for (const pending of _pendingRenders.values()) {
          pending.reject(new Error(event.message || 'Worker error'));
        }
        _pendingRenders.clear();
        worker.terminate();
        _wasmWorker = null;
      });
      _wasmWorker = worker;
      return worker;
    }

    function renderInWorker(payload) {
      const worker = getWasmWorker();
      const id = _nextRenderId++;
      return new Promise((resolve, reject) => {
        _pendingRenders.set(id, { resolve, reject });
        worker.postMessage({ id, ...payload });
      });
    }

    // Per-project library cache: dir -> Promise<Map<filename, source>>.
    const _projectSourcesCache = new Map();
    async function loadProjectSources(projectDir) {
      if (_projectSourcesCache.has(projectDir)) {
        return _projectSourcesCache.get(projectDir);
      }
      const promise = (async () => {
        const base = `sources/${projectDir}`;
        const manifestResp = await fetch(`${base}/manifest.json${cacheBust}`);
        if (!manifestResp.ok) throw new Error(`manifest.json missing for ${projectDir}`);
        const names = await manifestResp.json();
        const entries = await Promise.all(names.map(async (name) => {
          const r = await fetch(`${base}/${encodeURIComponent(name)}${cacheBust}`);
          if (!r.ok) throw new Error(`failed to fetch ${name}: ${r.status}`);
          // surface()/import() binary assets must be written to the wasm FS as
          // raw bytes — decoding a PNG via r.text() corrupts it.
          const isBinary = /\.(png|stl)$/i.test(name);
          return [name, isBinary ? new Uint8Array(await r.arrayBuffer()) : await r.text()];
        }));
        return new Map(entries);
      })();
      promise.catch(() => _projectSourcesCache.delete(projectDir));
      _projectSourcesCache.set(projectDir, promise);
      return promise;
    }

    function formatTime(m) {
      if (m < 60) return `${m}m`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      if (rem === 0) return `${h}h`;
      return `${h}h ${rem}m`;
    }

    // Touch gesture hint icons (inline SVGs)
    const TOUCH_ICON_ROTATE = `<svg viewBox="0 0 40 40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="22" r="4"/>
      <path d="M30 18a12 12 0 1 0-3.5 8.5"/>
      <path d="M30 22v-4h-4"/>
    </svg>`;
    const TOUCH_ICON_ZOOM = `<svg viewBox="0 0 40 40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20l-6 6M12 20l-6-6"/>
      <path d="M28 20l6 6M28 20l6-6"/>
      <circle cx="12" cy="20" r="3" fill="#fff" stroke="none"/>
      <circle cx="28" cy="20" r="3" fill="#fff" stroke="none"/>
    </svg>`;
    const TOUCH_ICON_PAN = `<svg viewBox="0 0 40 40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="16" cy="18" r="3" fill="#fff" stroke="none"/>
      <circle cx="24" cy="18" r="3" fill="#fff" stroke="none"/>
      <path d="M20 26l-5 5M20 26l5 5M20 26V18"/>
    </svg>`;

    let touchHintShown = sessionStorage.getItem('touchHintSeen') === '1';

    function showTouchHint(card) {
      const state = cardState.get(card);
      if (!state?.hintOverlay) return;
      const overlay = state.hintOverlay;
      overlay.style.display = 'flex';

      let dismissed = false;
      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        clearTimeout(timer);
        overlay.classList.add('fade-out');
        overlay.addEventListener('transitionend', () => {
          overlay.style.display = 'none';
        }, { once: true });
        state.canvas.removeEventListener('touchmove', dismiss);
      }

      const timer = setTimeout(dismiss, 5000);
      state.canvas.addEventListener('touchmove', dismiss, { once: true, passive: true });
      sessionStorage.setItem('touchHintSeen', '1');
    }

    let FILAMENT_COLORS = [];

    function displayName(filename) {
      return filename.replace(/\.stl$/i, '').replace(/[-_]/g, ' ');
    }

    // Must stay in sync with scripts/generate-gallery.py:slugify()
    function slugify(str) {
      return str.replace(/\.stl$/i, '').replace(/[_\s]+/g, '-').toLowerCase();
    }

    // Keep in sync with PUBLIC_REPO_URL in scripts/oembed_helpers.py and embed.html.
    const PUBLIC_REPO = 'https://github.com/stjohnb/3d-models';
    function publicSourceUrl(source) {
      if (!source) return '';
      return `${PUBLIC_REPO}/blob/main/${source.split('/').map(encodeURIComponent).join('/')}`;
    }

    function createViewer(canvas, stlUrl, onLoad, composite) {
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.localClippingEnabled = true;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f3460);

      const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 10000);

      // Controls are reassignable so the user can switch between Orbit,
      // Trackball, and Arcball at runtime (issue #230 — OrbitControls' fixed
      // world-up Y makes models authored in the XZ/YZ plane awkward to spin;
      // Trackball/Arcball are gimbal-lock-free). makeControls preserves the
      // current target so switching doesn't jump the view.
      let controls = null;
      let controlMode = 'orbit';
      function makeControls(mode) {
        const saved = controls ? controls.target.clone() : new THREE.Vector3();
        if (controls) controls.dispose();
        if (mode === 'trackball') {
          controls = new TrackballControls(camera, canvas);
          controls.handleResize();
        } else if (mode === 'arcball') {
          controls = new ArcballControls(camera, canvas, scene);
          controls.setGizmosVisible(false);
        } else {
          controls = new OrbitControls(camera, canvas);
          controls.enableDamping = true;
        }
        controls.target.copy(saved);
        controls.update();
        controlMode = mode;
      }

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(1, 2, 3);
      scene.add(dirLight);
      const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
      dirLight2.position.set(-2, -1, -1);
      scene.add(dirLight2);

      const material = new THREE.MeshPhongMaterial({
        color: 0x64b5f6,
        specular: 0x222222,
        shininess: 40,
        clippingPlanes: [],
        clipShadows: false,
      });

      const handle = {
        scene,
        camera,
        material,
        // Materials whose clipping planes the cross-section toggles. A single
        // model has just `material`; a composite has one per coloured part.
        materials: [material],
        mesh: null,
        defaultCameraPos: null,
      };

      makeControls('orbit');

      // World-space Y extent of the current mesh — drives the cross-section
      // clip plane. Recomputed after a rotation since rotating the mesh
      // changes its axis-aligned bounding box.
      function computeClipBBox() {
        if (!handle.mesh) return null;
        const box = new THREE.Box3().setFromObject(handle.mesh);
        return { minY: box.min.y, maxY: box.max.y };
      }

      function rotate90(axis) {
        if (!handle.mesh) return null;
        const v = axis === 'x' ? new THREE.Vector3(1, 0, 0)
          : axis === 'y' ? new THREE.Vector3(0, 1, 0)
          : new THREE.Vector3(0, 0, 1);
        handle.mesh.rotateOnWorldAxis(v, Math.PI / 2);
        return computeClipBBox();
      }

      function resetView() {
        if (handle.mesh) handle.mesh.rotation.set(0, 0, 0);
        if (handle.defaultCameraPos) camera.position.copy(handle.defaultCameraPos);
        controls.target.set(0, 0, 0);
        camera.up.set(0, 1, 0);
        makeControls(controlMode);
        return computeClipBBox();
      }

      function setControlMode(mode) {
        makeControls(mode);
      }

      function installGeometry(geometry) {
        geometry.computeBoundingBox();
        const halfSizeY = (geometry.boundingBox.max.y - geometry.boundingBox.min.y) / 2;
        geometry.center();

        if (handle.mesh) {
          scene.remove(handle.mesh);
          handle.mesh.geometry.dispose();
        }
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        handle.mesh = mesh;

        const box = geometry.boundingBox;
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim * 1.8;
        camera.position.set(dist * 0.6, dist * 0.5, dist * 0.8);
        handle.defaultCameraPos = camera.position.clone();
        controls.update();

        return { minY: -halfSizeY, maxY: halfSizeY };
      }

      // Composite models render each already-co-registered part STL as its
      // own coloured mesh in a single Group — colour that a monochrome STL
      // export can't carry (issue #275).
      function loadComposite(parts) {
        Promise.all(parts.map(p => new Promise((res, rej) =>
          new STLLoader().load(p.url, res, undefined, rej)
        ))).then((geometries) => {
          // A customizer render could (in principle) have raced ahead; bail if
          // so — mirrors the single-load guard.
          if (handle.customized) {
            for (const g of geometries) g.dispose?.();
            return;
          }
          // Union bounding box across all parts, then centre the whole group
          // at the origin (matches how single models call geometry.center()).
          const union = new THREE.Box3();
          for (const g of geometries) {
            g.computeBoundingBox();
            union.union(g.boundingBox);
          }
          const center = new THREE.Vector3();
          union.getCenter(center);

          const group = new THREE.Group();
          const partMaterials = [];
          geometries.forEach((geometry, i) => {
            geometry.translate(-center.x, -center.y, -center.z);
            const mat = new THREE.MeshPhongMaterial({
              color: parts[i].color,
              specular: 0x222222,
              shininess: 40,
              clippingPlanes: [],
              clipShadows: false,
            });
            group.add(new THREE.Mesh(geometry, mat));
            partMaterials.push(mat);
          });

          scene.add(group);
          handle.mesh = group;
          handle.materials = partMaterials;

          const size = new THREE.Vector3();
          union.getSize(size);
          const maxDim = Math.max(size.x, size.y, size.z);
          const dist = maxDim * 1.8;
          camera.position.set(dist * 0.6, dist * 0.5, dist * 0.8);
          handle.defaultCameraPos = camera.position.clone();
          controls.update();

          const halfSizeY = size.y / 2;
          if (onLoad) onLoad({ minY: -halfSizeY, maxY: halfSizeY });
        }).catch((err) => {
          console.error('Failed to load composite parts', err);
        });
      }

      if (composite && composite.length) {
        loadComposite(composite);
      } else {
        const loader = new STLLoader();
        loader.load(stlUrl, (geometry) => {
          // The customizer may have already replaced the mesh while this
          // default STL was downloading — skip the install in that case.
          if (handle.customized) {
            geometry.dispose?.();
            return;
          }
          const bbox = installGeometry(geometry);
          if (onLoad) onLoad(bbox);
        });
      }

      let rafId = null;

      function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (canvas.width !== w || canvas.height !== h) {
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          controls.handleResize?.();
        }
      }

      function animate() {
        rafId = requestAnimationFrame(animate);
        resize();
        controls.update();
        renderer.render(scene, camera);
      }

      function start() {
        if (rafId === null) animate();
      }

      function stop() {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      animate();
      Object.assign(handle, {
        start, stop, installGeometry,
        rotate90, resetView, setControlMode,
        getControlMode: () => controlMode,
        getControls: () => controls,
      });
      return handle;
    }

    // Swap a card's rendered mesh with a fresh STL (e.g. from the
    // customizer). Returns a promise that resolves once the geometry is
    // installed. Card must already be activated.
    async function replaceMesh(card, stlUrl) {
      const state = cardState.get(card);
      if (!state?.viewer) return;
      const geometry = await new Promise((resolve, reject) => {
        new STLLoader().load(stlUrl, resolve, undefined, reject);
      });
      state.viewer.customized = true;
      const bbox = state.viewer.installGeometry(geometry);
      state.clipBBox = bbox;
      // Enable the cross-section controls if they're still waiting on the
      // default STL — the customized geometry is enough to drive them.
      const ccBtn = card.querySelector('.cross-btn');
      if (ccBtn) ccBtn.disabled = false;
      const ccSlider = card.querySelector('.clip-slider');
      if (ccSlider) ccSlider.disabled = false;
      card.querySelectorAll('.view-btn').forEach(b => { b.disabled = false; });
      // If the cross-section is active, re-anchor the clip plane to the
      // new bounding box so the slider keeps making sense.
      if (state.clipPlane) {
        const slider = card.querySelector('.clip-slider');
        const pct = slider ? (Number(slider.value) / 100) : 0.5;
        state.clipPlane.constant = bbox.minY + pct * (bbox.maxY - bbox.minY);
      }
    }

    // Cache-busting hash injected at build time
    const BUILD_HASH = '__BUILD_HASH__';
    const cacheBust = BUILD_HASH.startsWith('__') ? '' : `?v=${BUILD_HASH}`;

    function showQrPopover(qrPath, modelName) {
      document.querySelector('.qr-overlay')?.remove();

      const overlay = document.createElement('div');
      overlay.className = 'qr-overlay';
      const popover = document.createElement('div');
      popover.className = 'qr-popover';

      const img = document.createElement('img');
      img.src = qrPath + cacheBust;
      img.alt = `QR code for ${modelName}`;
      popover.appendChild(img);

      const caption = document.createElement('p');
      caption.textContent = modelName;
      popover.appendChild(caption);

      overlay.appendChild(popover);
      function dismiss() {
        overlay.remove();
        document.removeEventListener('keydown', onKey);
      }
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) dismiss();
      });
      document.body.appendChild(overlay);

      function onKey(e) {
        if (e.key === 'Escape') dismiss();
      }
      document.addEventListener('keydown', onKey);
    }

    // Map from card element to viewer state
    const cardState = new Map();
    let visibilityObserver = null;

    function activateCard(card) {
      const state = cardState.get(card);
      if (!state || state.initialized) return;
      state.initialized = true;
      state.placeholder.style.display = 'none';
      state.canvas.style.display = 'block';
      state.viewer = createViewer(state.canvas, state.stlUrl, (bbox) => {
        state.clipBBox = bbox;
        const slider = card.querySelector('.clip-slider');
        if (slider) slider.disabled = false;
        const btn = card.querySelector('.cross-btn');
        if (btn) btn.disabled = false;
        card.querySelectorAll('.view-btn').forEach(b => { b.disabled = false; });
      }, state.composite);
      if (!state.composite && state.selectedColor !== 0x64b5f6) {
        state.viewer.material.color.setHex(state.selectedColor);
      }
      // Show touch gesture hints immediately on mobile (once per session)
      if (!touchHintShown && ('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
        touchHintShown = true;
        showTouchHint(card);
      }
      if (visibilityObserver) visibilityObserver.observe(card);
    }

    function toggleMaximize(card) {
      if (document.fullscreenElement) return;
      const isMaximized = card.classList.contains('card--maximized');
      if (isMaximized) {
        card.classList.remove('card--maximized');
        document.body.classList.remove('has-maximized');
        document.querySelector('.maximize-backdrop')?.remove();
        card.querySelector('.maximize-btn')?.setAttribute('aria-label', 'Maximize model preview');
      } else {
        document.querySelectorAll('.card--maximized').forEach(c => {
          c.classList.remove('card--maximized');
          c.querySelector('.maximize-btn')?.setAttribute('aria-label', 'Maximize model preview');
        });
        document.querySelector('.maximize-backdrop')?.remove();
        const backdrop = document.createElement('div');
        backdrop.className = 'maximize-backdrop';
        backdrop.addEventListener('click', () => toggleMaximize(card));
        document.body.appendChild(backdrop);
        card.classList.add('card--maximized');
        document.body.classList.add('has-maximized');
        card.querySelector('.maximize-btn')?.setAttribute('aria-label', 'Close maximized preview');
      }
    }

    function parseHash() {
      const hash = decodeURIComponent(window.location.hash.slice(1));
      if (!hash) return null;
      const sep = hash.indexOf('/');
      if (sep === -1) return { project: hash, model: null };
      return { project: hash.slice(0, sep), model: hash.slice(sep + 1) };
    }

    function navigateToHash() {
      const target = parseHash();
      if (!target) return;

      const section = gallery.querySelector(`.project-group[data-slug="${CSS.escape(target.project)}"]`);
      if (!section) return;

      section.classList.remove('collapsed');
      section.querySelector('h2')?.setAttribute('aria-expanded', 'true');

      if (!target.model) {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }

      const card = section.querySelector(`.card[data-slug="${CSS.escape(target.model)}"]`);
      if (!card) return;

      activateCard(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function init() {
      let models;
      try {
        const [modelsResp, colorsResp] = await Promise.all([
          fetch(`models.json${cacheBust}`),
          fetch(`filament-colors.json${cacheBust}`),
        ]);
        if (!modelsResp.ok) throw new Error(modelsResp.status);
        if (!colorsResp.ok) throw new Error(colorsResp.status);
        models = await modelsResp.json();
        FILAMENT_COLORS = (await colorsResp.json()).map(c => {
          if (!/^[0-9a-fA-F]{6}$/.test(c.hex)) throw new Error(`Invalid hex value for color "${c.name}": "${c.hex}"`);
          const hex = parseInt(c.hex, 16);
          return { name: c.name, hex };
        });
      } catch (e) {
        console.error(e);
        gallery.innerHTML = '<div class="loading">Failed to load models</div>';
        return;
      }

      // In PR previews, changed.json lists projects with modified models
      // Sections not in that list are collapsed; on the main site it won't exist
      let changedProjects = null;
      try {
        const changedResp = await fetch(`changed.json${cacheBust}`);
        if (changedResp.ok) changedProjects = await changedResp.json();
      } catch (e) { /* main site — all sections collapse by default */ }

      gallery.innerHTML = '';

      for (const [project, projectData] of Object.entries(models).sort(([a], [b]) => a.localeCompare(b))) {
        const files = projectData.files;
        const section = document.createElement('div');
        section.className = 'project-group';
        section.setAttribute('role', 'group');
        section.setAttribute('aria-label', project);
        section.dataset.slug = slugify(project);
        const isCollapsed = changedProjects ? !changedProjects.includes(project) : true;
        if (isCollapsed) {
          section.classList.add('collapsed');
        }

        const heading = document.createElement('h2');
        heading.textContent = project;
        heading.setAttribute('role', 'button');
        heading.setAttribute('tabindex', '0');
        heading.setAttribute('aria-expanded', isCollapsed ? 'false' : 'true');

        function toggleSection() {
          section.classList.toggle('collapsed');
          const expanded = !section.classList.contains('collapsed');
          heading.setAttribute('aria-expanded', String(expanded));
          // When expanding, check for uninitialized visible cards
          if (expanded) {
            for (const card of section.querySelectorAll('.card')) {
              const state = cardState.get(card);
              if (state && !state.initialized) {
                const rect = card.getBoundingClientRect();
                if (rect.bottom > 0 && rect.top < window.innerHeight) {
                  activateCard(card);
                }
              }
            }
          }
        }

        heading.addEventListener('click', toggleSection);
        heading.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggleSection();
          }
        });

        const header = document.createElement('div');
        header.className = 'project-header';
        header.appendChild(heading);

        if (projectData.zip) {
          const zipBtn = document.createElement('a');
          zipBtn.className = 'download-all-btn';
          zipBtn.href = `${projectData.zip}${cacheBust}`;
          zipBtn.download = projectData.zip;
          zipBtn.textContent = `Download All (${files.length} STLs)`;
          zipBtn.setAttribute('aria-label', `Download all ${files.length} STLs for ${project}`);
          header.appendChild(zipBtn);
        }

        if (projectData.sourceZip) {
          const srcBtn = document.createElement('a');
          srcBtn.className = 'download-all-btn';
          srcBtn.href = `${projectData.sourceZip}${cacheBust}`;
          srcBtn.download = projectData.sourceZip;
          srcBtn.textContent = 'Download Source';
          srcBtn.setAttribute('aria-label', `Download source files for ${project}`);
          header.appendChild(srcBtn);
        }

        if (projectData.dir) {
          const repoBtn = document.createElement('a');
          repoBtn.className = 'download-all-btn';
          repoBtn.href = `${PUBLIC_REPO}/tree/main/${projectData.dir.split('/').map(encodeURIComponent).join('/')}`;
          repoBtn.target = '_blank';
          repoBtn.rel = 'noopener noreferrer';
          repoBtn.textContent = 'View on GitHub';
          repoBtn.setAttribute('aria-label', `View ${project} source directory on GitHub`);
          header.appendChild(repoBtn);
        }

        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'project-grid';

        for (const model of files) {
          const card = document.createElement('div');
          card.className = 'card';
          card.setAttribute('tabindex', '0');
          card.dataset.slug = slugify(model.stl);

          const stlUrl = `${model.stl}${cacheBust}`;
          const pngUrl = `${model.stl.replace(/\.stl$/i, '.png')}${cacheBust}`;

          // Composite descriptor: when meta.json declares this STL's card is a
          // coloured multi-part assembly, load the part STLs instead (issue
          // #275). Colours are re-validated here as defence-in-depth even
          // though the schema already enforces #rrggbb.
          const composite = (projectData.assembly && projectData.assembly.stl === model.stl
              && Array.isArray(projectData.assembly.parts))
            ? projectData.assembly.parts
                .filter(p => typeof p.stl === 'string' && /^#[0-9a-fA-F]{6}$/.test(p.color))
                .map(p => ({ url: `${p.stl}${cacheBust}`, color: p.color }))
            : null;

          // PNG placeholder shown until viewer activates
          const placeholder = document.createElement('img');
          placeholder.className = 'card-placeholder';
          placeholder.src = pngUrl;
          placeholder.alt = displayName(model.stl);
          placeholder.loading = 'lazy';
          placeholder.decoding = 'async';
          card.appendChild(placeholder);

          const modelName = displayName(model.stl);

          // Canvas hidden until viewer activates
          const canvas = document.createElement('canvas');
          canvas.style.display = 'none';
          canvas.setAttribute('role', 'img');
          canvas.setAttribute('aria-label', `Interactive 3D preview of ${modelName}`);
          card.appendChild(canvas);

          // Fallback if PNG doesn't exist: show canvas immediately
          placeholder.onerror = () => {
            placeholder.style.display = 'none';
            activateCard(card);
          };

          // Touch gesture hint overlay (hidden until first touch on mobile)
          const hintOverlay = document.createElement('div');
          hintOverlay.className = 'touch-hint';
          hintOverlay.setAttribute('aria-hidden', 'true');
          hintOverlay.style.display = 'none';
          hintOverlay.innerHTML = `
            <div class="touch-hint-item">${TOUCH_ICON_ROTATE}<span>Rotate</span></div>
            <div class="touch-hint-item">${TOUCH_ICON_ZOOM}<span>Zoom</span></div>
            <div class="touch-hint-item">${TOUCH_ICON_PAN}<span>Pan</span></div>
          `;
          card.appendChild(hintOverlay);

          cardState.set(card, {
            canvas,
            placeholder,
            stlUrl,
            composite,
            hintOverlay,
            initialized: false,
            viewer: null,
            selectedColor: 0x64b5f6,
            clipBBox: null,
            clipPlane: null,
          });

          const fsBtn = document.createElement('button');
          fsBtn.className = 'fullscreen-btn';
          fsBtn.textContent = '\u26F6';
          fsBtn.setAttribute('aria-label', 'Toggle fullscreen');
          fsBtn.addEventListener('click', () => {
            activateCard(card);
            window.history.replaceState(null, '', `#${section.dataset.slug}/${card.dataset.slug}`);
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else {
              if (card.classList.contains('card--maximized')) toggleMaximize(card);
              card.requestFullscreen();
            }
          });
          card.appendChild(fsBtn);

          const maxBtn = document.createElement('button');
          maxBtn.className = 'maximize-btn';
          maxBtn.setAttribute('aria-label', 'Maximize model preview');
          maxBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
  <path d="M1 1h4v1.5H3.06L5.5 4.94 4.44 6 2 3.56V5.5H.5V1H1zm12 0v4.5H11.5V3.56L9.06 6 8 4.94 10.44 2.5H8.5V1H13zm0 12h-4.5v-1.5h1.94L8 9.06 9.06 8 11.5 10.44V8.5H13V13zm-12 0V8.5H.5v1.94L2.94 8 4 9.06 1.56 11.5H3.5V13H1z"/>
</svg>`;
          maxBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            activateCard(card);
            toggleMaximize(card);
          });
          card.appendChild(maxBtn);

          if (model.qr) {
            const qrBtn = document.createElement('button');
            qrBtn.className = 'qr-btn';
            qrBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
              <rect x="1" y="1" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <rect x="3" y="3" width="3" height="3"/>
              <rect x="10" y="1" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <rect x="12" y="3" width="3" height="3"/>
              <rect x="1" y="10" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <rect x="3" y="12" width="3" height="3"/>
              <rect x="11" y="11" width="2" height="2"/>
              <rect x="15" y="11" width="2" height="2"/>
              <rect x="11" y="15" width="2" height="2"/>
              <rect x="15" y="15" width="2" height="2"/>
              <rect x="13" y="13" width="2" height="2"/>
            </svg>`;
            qrBtn.setAttribute('aria-label', `Show QR code for ${modelName}`);
            qrBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              showQrPopover(model.qr, modelName);
            });
            card.appendChild(qrBtn);
          }

          // A composite has fixed per-part colours — no filament swatch.
          if (!composite) {
            const colorPicker = document.createElement('div');
            colorPicker.className = 'color-picker';
            colorPicker.setAttribute('aria-label', 'Change filament color');
            for (const color of FILAMENT_COLORS) {
              const swatch = document.createElement('button');
              swatch.className = 'color-swatch';
              swatch.style.backgroundColor = `#${color.hex.toString(16).padStart(6, '0')}`;
              swatch.title = color.name;
              swatch.setAttribute('aria-label', color.name);
              if (color.hex === 0x64b5f6) swatch.setAttribute('aria-pressed', 'true');
              swatch.addEventListener('click', () => {
                colorPicker.querySelectorAll('.color-swatch').forEach(s => s.removeAttribute('aria-pressed'));
                swatch.setAttribute('aria-pressed', 'true');
                const state = cardState.get(card);
                if (state) {
                  state.selectedColor = color.hex;
                  if (state.viewer) state.viewer.material.color.setHex(color.hex);
                }
              });
              colorPicker.appendChild(swatch);
            }
            card.appendChild(colorPicker);
          }

          // Cross-section controls
          const crossRow = document.createElement('div');
          crossRow.className = 'cross-section-row';

          const crossBtn = document.createElement('button');
          crossBtn.className = 'cross-btn';
          crossBtn.textContent = '✂ Cross Section';
          crossBtn.setAttribute('aria-label', 'Toggle cross section');
          crossBtn.setAttribute('aria-pressed', 'false');
          crossBtn.disabled = true;

          const clipSlider = document.createElement('input');
          clipSlider.type = 'range';
          clipSlider.className = 'clip-slider';
          clipSlider.min = '0';
          clipSlider.max = '100';
          clipSlider.value = '50';
          clipSlider.setAttribute('aria-label', 'Cross section depth');
          clipSlider.disabled = true;
          clipSlider.style.display = 'none';

          crossBtn.addEventListener('click', () => {
            const state = cardState.get(card);
            if (!state?.viewer) return;
            const active = crossBtn.getAttribute('aria-pressed') === 'true';
            if (active) {
              for (const m of state.viewer.materials) m.clippingPlanes = [];
              state.clipPlane = null;
              clipSlider.style.display = 'none';
              crossBtn.setAttribute('aria-pressed', 'false');
            } else {
              const plane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
              if (state.clipBBox) {
                const { minY, maxY } = state.clipBBox;
                plane.constant = minY + 0.5 * (maxY - minY);
              }
              for (const m of state.viewer.materials) m.clippingPlanes = [plane];
              state.clipPlane = plane;
              clipSlider.value = '50';
              clipSlider.style.display = '';
              crossBtn.setAttribute('aria-pressed', 'true');
            }
          });

          clipSlider.addEventListener('input', () => {
            const state = cardState.get(card);
            if (!state?.clipPlane || !state.clipBBox) return;
            const pct = clipSlider.value / 100;
            const { minY, maxY } = state.clipBBox;
            state.clipPlane.constant = minY + pct * (maxY - minY);
          });

          crossRow.appendChild(crossBtn);
          crossRow.appendChild(clipSlider);

          // View controls — 90° rotation per axis, reset, and a switch between
          // Orbit / Trackball / Arcball controls (issue #230). Disabled until a
          // mesh is loaded; enabled by the same hook as the cross-section row.
          const viewRow = document.createElement('div');
          viewRow.className = 'view-controls-row';

          // Re-anchor the cross-section clip plane after a rotation/reset
          // changes the model's world-space Y extent.
          function applyClipBBox(bbox) {
            if (!bbox) return;
            const state = cardState.get(card);
            if (!state) return;
            state.clipBBox = bbox;
            if (state.clipPlane) {
              const pct = Number(clipSlider.value) / 100;
              state.clipPlane.constant = bbox.minY + pct * (bbox.maxY - bbox.minY);
            }
          }

          for (const axis of ['x', 'y', 'z']) {
            const rb = document.createElement('button');
            rb.className = 'view-btn';
            rb.textContent = `Rotate ${axis.toUpperCase()}`;
            rb.setAttribute('aria-label', `Rotate model 90 degrees about the ${axis.toUpperCase()} axis`);
            rb.disabled = true;
            rb.addEventListener('click', () => {
              const state = cardState.get(card);
              if (!state?.viewer) return;
              applyClipBBox(state.viewer.rotate90(axis));
            });
            viewRow.appendChild(rb);
          }

          const resetBtn = document.createElement('button');
          resetBtn.className = 'view-btn';
          resetBtn.textContent = 'Reset';
          resetBtn.setAttribute('aria-label', 'Reset view orientation and camera');
          resetBtn.disabled = true;
          resetBtn.addEventListener('click', () => {
            const state = cardState.get(card);
            if (!state?.viewer) return;
            applyClipBBox(state.viewer.resetView());
          });
          viewRow.appendChild(resetBtn);

          const modeDefs = [
            { mode: 'orbit', label: 'Orbit' },
            { mode: 'trackball', label: 'Trackball' },
            { mode: 'arcball', label: 'Arcball' },
          ];
          const modeButtons = [];
          for (const def of modeDefs) {
            const b = document.createElement('button');
            b.className = 'view-btn mode-btn';
            b.textContent = def.label;
            b.setAttribute('aria-label', `Use ${def.label} controls`);
            b.setAttribute('aria-pressed', def.mode === 'orbit' ? 'true' : 'false');
            b.disabled = true;
            b.addEventListener('click', () => {
              const state = cardState.get(card);
              if (!state?.viewer) return;
              state.viewer.setControlMode(def.mode);
              modeButtons.forEach(mb => mb.setAttribute('aria-pressed',
                mb === b ? 'true' : 'false'));
            });
            viewRow.appendChild(b);
            modeButtons.push(b);
          }

          // In-browser parametric customizer — only present when the model
          // ships a validated parameters manifest. Lazy-loads openscad-wasm
          // on first click; failures degrade silently (default STL stays).
          if (model.parameters?.parameters?.length) {
            const customizeBtn = document.createElement('button');
            customizeBtn.className = 'customize-btn';
            customizeBtn.textContent = '⚙ Customize';
            customizeBtn.setAttribute('aria-label', `Customize ${modelName} parameters`);
            customizeBtn.setAttribute('aria-pressed', 'false');
            crossRow.appendChild(customizeBtn);

            const panel = document.createElement('div');
            panel.className = 'customizer-panel';

            const status = document.createElement('div');
            status.className = 'customizer-status';
            status.setAttribute('aria-live', 'polite');

            const downloadLink = document.createElement('a');
            downloadLink.className = 'customizer-download';
            downloadLink.hidden = true;
            downloadLink.download = model.stl.replace(/\.stl$/i, '') + '__custom.stl';
            downloadLink.textContent = '⬇ Download customized STL';

            // Re-render button + status share a row beneath the param list.
            const actions = document.createElement('div');
            actions.className = 'customizer-actions';
            const rerenderBtn = document.createElement('button');
            rerenderBtn.type = 'button';
            rerenderBtn.className = 'rerender-btn';
            rerenderBtn.textContent = '⟳ Re-render';
            rerenderBtn.setAttribute('aria-label', `Re-render ${modelName} with current parameters`);
            actions.appendChild(rerenderBtn);
            actions.appendChild(status);

            const paramRows = [];
            const paramValues = {};
            function markDirty(row) {
              if (row) row.classList.add('param-row--dirty');
              rerenderBtn.classList.add('dirty');
            }
            function clearDirty() {
              for (const r of panel.querySelectorAll('.param-row--dirty')) {
                r.classList.remove('param-row--dirty');
              }
              rerenderBtn.classList.remove('dirty');
            }

            for (const p of model.parameters.parameters) {
              const row = document.createElement('div');
              row.className = 'param-row';
              const label = document.createElement('label');
              label.textContent = p.label;
              const inputId = `param-${card.dataset.slug}-${p.name}`;
              label.htmlFor = inputId;
              row.appendChild(label);
              if (p.type === 'number') {
                const input = document.createElement('input');
                input.type = 'range';
                input.id = inputId;
                input.min = String(p.min);
                input.max = String(p.max);
                input.step = String(p.step);
                input.value = String(p.default);
                const display = document.createElement('span');
                display.className = 'param-value';
                display.textContent = String(p.default);
                paramValues[p.name] = Number(p.default);
                input.addEventListener('input', () => {
                  const v = Number(input.value);
                  paramValues[p.name] = v;
                  display.textContent = String(v);
                  markDirty(row);
                });
                row.appendChild(input);
                row.appendChild(display);
                paramRows.push({ p, input, display, row });
              } else if (p.type === 'boolean') {
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.id = inputId;
                input.checked = Boolean(p.default);
                paramValues[p.name] = Boolean(p.default);
                input.addEventListener('change', () => {
                  paramValues[p.name] = input.checked;
                  markDirty(row);
                });
                row.appendChild(input);
                paramRows.push({ p, input, row });
              }
              panel.appendChild(row);
            }
            panel.appendChild(actions);
            panel.appendChild(downloadLink);

            let inFlight = false;

            async function runRender(initialLabel = 'Rendering…') {
              if (inFlight) return;
              inFlight = true;
              rerenderBtn.disabled = true;
              const renderedParams = { ...paramValues };
              status.classList.remove('error');
              status.textContent = initialLabel;
              const startMs = performance.now();
              let url;
              try {
                const sources = await loadProjectSources(projectData.dir);
                const entryName = model.source.split('/').pop();
                const stlBytes = await renderInWorker({
                  sources: Array.from(sources.entries()),
                  entry: entryName,
                  params: { ...renderedParams },
                  projectDir: projectData.dir,
                });
                const blob = new Blob([stlBytes], { type: 'model/stl' });
                url = URL.createObjectURL(blob);
                await replaceMesh(card, url);
                const prevHref = downloadLink.dataset.blobUrl;
                if (prevHref) URL.revokeObjectURL(prevHref);
                downloadLink.href = url;
                downloadLink.dataset.blobUrl = url;
                downloadLink.hidden = false;
                const ms = Math.round(performance.now() - startMs);
                status.textContent = `Rendered in ${(ms / 1000).toFixed(1)}s`;
                const stillMatch = Object.keys(renderedParams).every(k => paramValues[k] === renderedParams[k]);
                if (stillMatch) clearDirty();
              } catch (err) {
                if (url) URL.revokeObjectURL(url);
                console.error('Customizer render failed:', err);
                status.classList.add('error');
                status.textContent = `Error: ${err.message || err}`;
              } finally {
                inFlight = false;
                rerenderBtn.disabled = false;
              }
            }

            rerenderBtn.addEventListener('click', () => runRender());

            customizeBtn.addEventListener('click', () => {
              const open = panel.classList.toggle('open');
              customizeBtn.setAttribute('aria-pressed', String(open));
              if (open) {
                activateCard(card);
                if (downloadLink.hidden) {
                  runRender('Loading initial preview…');
                }
              }
            });

            card.appendChild(crossRow);
            card.appendChild(panel);
            card.appendChild(viewRow);
          } else {
            card.appendChild(crossRow);
            card.appendChild(viewRow);
          }

          card.addEventListener('click', (e) => {
            if (e.target.closest('button, a, input, .color-picker')) return;
            window.history.replaceState(null, '', `#${section.dataset.slug}/${card.dataset.slug}`);
          });

          const standaloneUrl = `standalone/${encodeURI(model.stl.replace(/\.stl$/i, '.html'))}`;
          const info = document.createElement('div');
          info.className = 'card-info';
          const h3 = document.createElement('h3');
          h3.textContent = modelName;
          info.appendChild(h3);

          if (model.estimated_minutes) {
            const t = document.createElement('span');
            t.className = 'print-time';
            t.textContent = `~${formatTime(model.estimated_minutes)}`;
            info.appendChild(t);
          }

          const links = document.createElement('div');
          links.className = 'card-links';

          const dl = document.createElement('a');
          dl.href = model.stl + cacheBust;
          dl.setAttribute('download', '');
          dl.setAttribute('aria-label', `Download STL for ${modelName}`);
          dl.textContent = 'Download STL';
          links.appendChild(dl);

          const sa = document.createElement('a');
          sa.href = standaloneUrl + cacheBust;
          sa.setAttribute('aria-label', `View standalone HTML viewer for ${modelName}`);
          sa.textContent = 'Standalone';
          links.appendChild(sa);

          if (model.source) {
            const src = document.createElement('a');
            src.href = publicSourceUrl(model.source);
            src.target = '_blank';
            src.rel = 'noopener noreferrer';
            src.setAttribute('aria-label', `View OpenSCAD source for ${modelName} on GitHub`);
            src.textContent = 'Source';
            links.appendChild(src);
          }

          info.appendChild(links);
          card.appendChild(info);

          grid.appendChild(card);
        }

        section.appendChild(grid);
        gallery.appendChild(section);
      }

      // Pause/resume animation for off-screen initialized viewers
      visibilityObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          const state = cardState.get(entry.target);
          if (!state?.viewer) continue;
          if (entry.isIntersecting) {
            state.viewer.start();
          } else {
            state.viewer.stop();
          }
        }
      });

      // Lazy-load: initialize viewers as cards scroll into view
      const initObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          const card = entry.target;
          const state = cardState.get(card);
          if (!state || state.initialized) {
            initObserver.unobserve(card);
            continue;
          }
          // Skip cards in collapsed sections (expand handler will catch them)
          if (card.closest('.project-group')?.classList.contains('collapsed')) continue;
          activateCard(card);
          initObserver.unobserve(card);
        }
      }, { rootMargin: '200px' });

      // Observe all cards
      for (const card of cardState.keys()) {
        initObserver.observe(card);
      }

      // Keyboard navigation
      function getVisibleCards() {
        return [...document.querySelectorAll('.project-group:not(.collapsed) .card')];
      }

      document.addEventListener('keydown', (e) => {
        // Skip if typing in an input/textarea or if modifier keys are held
        const tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        if (e.ctrlKey || e.altKey || e.metaKey) return;

        if (e.key === 'Escape') {
          if (document.fullscreenElement) return;
          const maximized = document.querySelector('.card--maximized');
          if (maximized) {
            e.preventDefault();
            toggleMaximize(maximized);
            return;
          }
        }

        const card = e.target.closest('.card');

        // Arrow key navigation between cards (only when a .card itself is focused)
        if ((e.key === 'ArrowRight' || e.key === 'ArrowDown' ||
             e.key === 'ArrowLeft' || e.key === 'ArrowUp') &&
            e.target.classList.contains('card')) {
          const cards = getVisibleCards();
          const idx = cards.indexOf(e.target);
          if (idx === -1) return;
          const next = (e.key === 'ArrowRight' || e.key === 'ArrowDown')
            ? idx + 1 : idx - 1;
          if (next >= 0 && next < cards.length) {
            e.preventDefault();
            cards[next].focus();
            activateCard(cards[next]);
          }
          return;
        }

        // Card-level shortcuts (when focus is on a card or within a card)
        if (card) {
          if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            activateCard(card);
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else {
              if (card.classList.contains('card--maximized')) toggleMaximize(card);
              card.requestFullscreen();
            }
            return;
          }
          if (e.key === 'd' || e.key === 'D') {
            e.preventDefault();
            const dl = card.querySelector('a[download]');
            if (dl) dl.click();
            return;
          }
          if (e.key === 'c' || e.key === 'C') {
            e.preventDefault();
            const btn = card.querySelector('.cross-btn');
            if (btn) btn.click();
            return;
          }
          if (e.key === 'm' || e.key === 'M') {
            if (document.fullscreenElement) return;
            e.preventDefault();
            activateCard(card);
            toggleMaximize(card);
            return;
          }
          if (e.key === 'r' || e.key === 'R') {
            const btn = card.querySelector('.rerender-btn');
            if (btn && !btn.disabled) {
              e.preventDefault();
              btn.click();
            }
            return;
          }
        }
      });

      // Deep-link: navigate to hash target on initial load
      navigateToHash();

      // Handle hash changes (back/forward, manual URL edit)
      window.addEventListener('hashchange', navigateToHash);
    }

    init();
  </script>
</body>
</html>
